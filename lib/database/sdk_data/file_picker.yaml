package: file_picker
display_name: file_picker
data_collected:
  - type: photos
    purpose: app_functionality
    shared_with_third_parties: false
    optional: true
    linked_to_identity: false
  - type: files_and_docs
    purpose: app_functionality
    shared_with_third_parties: false
    optional: true
    linked_to_identity: false
encrypted_in_transit: true
user_can_request_deletion: true
requires_xcprivacy_entry: true
required_reason_apis: []
notes: >
  Community plugin (miguelpruivo/flutter_file_picker). Local file/document
  (and optionally media) picking — does not phone home. linked_to_identity
  false by default; override to true if uploads are tied to a user account.
  On iOS may pull in DKImagePickerController for media types — needs manual
  verification of your FileType usage. Plugin includes PrivacyInfo.xcprivacy
  in recent versions.
