package: onesignal_flutter
display_name: OneSignal
data_collected:
  - type: device_id
    purpose: app_functionality
    shared_with_third_parties: true
    optional: false
  - type: product_interaction
    purpose: analytics
    shared_with_third_parties: true
    optional: false
  - type: product_interaction
    purpose: developer_communications
    shared_with_third_parties: true
    optional: false
  - type: purchase_history
    purpose: analytics
    shared_with_third_parties: true
    optional: true
  - type: email
    purpose: developer_communications
    shared_with_third_parties: true
    optional: true
encrypted_in_transit: true
user_can_request_deletion: true
requires_xcprivacy_entry: true
required_reason_apis: [UserDefaults]
notes: >
  Based on https://documentation.onesignal.com/docs/en/apple-app-privacy-requirements
  and Google Play Data Safety docs. Default: push subscription / device
  identifiers, session activity, notification clicks; consumable IAP events
  when present. Email/phone only if you set them via SDK. Tags/Outcomes may
  add more — needs manual verification for your Tag schema and whether you
  treat OneSignal sharing as third-party (it is a third-party processor).
