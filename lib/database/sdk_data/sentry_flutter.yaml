package: sentry_flutter
display_name: Sentry
data_collected:
  - type: crash_data
    purpose: analytics
    shared_with_third_parties: true
    optional: false
  - type: diagnostics
    purpose: app_functionality
    shared_with_third_parties: true
    optional: false
  - type: device_id
    purpose: analytics
    shared_with_third_parties: true
    optional: false
  - type: user_id
    purpose: analytics
    shared_with_third_parties: true
    optional: true
  - type: email
    purpose: analytics
    shared_with_third_parties: true
    optional: true
encrypted_in_transit: true
user_can_request_deletion: true
requires_xcprivacy_entry: true
required_reason_apis: [UserDefaults, FileTimestamp, SystemBootTime]
notes: >
  Based on https://docs.sentry.io/security-legal-pii/security/mobile-privacy/
  and Sentry Flutter privacy manifest docs. By default sends crash/error
  events, device context, and randomly generated IDs. User ID / email only
  if you set SentryUser. Purposes typically Analytics + App functionality.
  needs manual verification of any custom breadcrumbs, attachments, or PII
  you configure the SDK to send.
