package: image_picker
display_name: image_picker
data_collected:
  - type: photos
    purpose: app_functionality
    shared_with_third_parties: false
    optional: true
    linked_to_identity: false
  - type: videos
    purpose: app_functionality
    shared_with_third_parties: false
    optional: true
    linked_to_identity: false
encrypted_in_transit: true
user_can_request_deletion: true
requires_xcprivacy_entry: true
required_reason_apis: []
notes: >
  Official Flutter plugin for picking images/videos from gallery or camera.
  Does not upload media to a Flutter/Google endpoint by itself — collection
  is on-device until *your* app uploads it. linked_to_identity false for the
  plugin default; override to true if you associate picks with a user account
  or upload to a backend. Requires Info.plist usage strings as applicable.
