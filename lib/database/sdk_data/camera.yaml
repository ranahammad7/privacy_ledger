package: camera
display_name: camera
data_collected:
  - type: photos
    purpose: app_functionality
    shared_with_third_parties: false
    optional: true
    linked_to_identity: false
  - type: videos
    purpose: app_functionality
    shared_with_third_parties: false
    optional: true
    linked_to_identity: false
encrypted_in_transit: true
user_can_request_deletion: true
requires_xcprivacy_entry: true
required_reason_apis: []
notes: >
  Official Flutter camera plugin. Captures media on-device only until your app
  uploads it. linked_to_identity false by default; override if captures are
  tied to a user account. Requires camera (and often mic) usage descriptions.
