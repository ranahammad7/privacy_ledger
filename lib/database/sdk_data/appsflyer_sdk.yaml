package: appsflyer_sdk
display_name: AppsFlyer
data_collected:
  - type: device_id
    purpose: advertising
    shared_with_third_parties: true
    optional: false
  - type: product_interaction
    purpose: analytics
    shared_with_third_parties: true
    optional: false
  - type: approximate_location
    purpose: advertising
    shared_with_third_parties: true
    optional: true
encrypted_in_transit: true
user_can_request_deletion: true
requires_xcprivacy_entry: true
required_reason_apis: [UserDefaults]
notes: >
  Mobile attribution/MMP. Collects advertising identifiers and attribution
  events; often tracking-related under ATT. needs manual verification against
  current AppsFlyer privacy / ATT guidance for your SDK version and
  conversion data sharing settings.
